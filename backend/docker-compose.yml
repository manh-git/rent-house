services:
  db:
    image: postgres:15
    container_name: tro_app_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: passwordpw
      POSTGRES_DB: tro_app_db
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tro_app_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: